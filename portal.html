<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Converta.AI — Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--teal:#00ffe5;--teal-dim:rgba(0,255,229,.08);--teal-mid:rgba(0,255,229,.18);--bg:#020408;--bg2:#060d10;--bg3:#0a1418;--border:rgba(0,255,229,.12);--border-bright:rgba(0,255,229,.3);--text:#e8f5f2;--text-dim:#6b9e94;--text-muted:rgba(232,245,242,.4);--gold:#f0c040;--red:#ff4060;--green:#00e5a0;--card:rgba(0,255,229,.04)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
@keyframes grid-drift{0%{background-position:0px 0px}50%{background-position:27px 27px}100%{background-position:54px 54px}}
@keyframes orb-move{0%{transform:translate(0%,0%) scale(1);opacity:.06}25%{transform:translate(30%,-20%) scale(1.2);opacity:.1}50%{transform:translate(60%,10%) scale(.9);opacity:.07}75%{transform:translate(20%,40%) scale(1.1);opacity:.09}100%{transform:translate(0%,0%) scale(1);opacity:.06}}
@keyframes orb-move2{0%{transform:translate(0%,0%) scale(1);opacity:.05}33%{transform:translate(-40%,30%) scale(1.3);opacity:.09}66%{transform:translate(20%,-40%) scale(.8);opacity:.06}100%{transform:translate(0%,0%) scale(1);opacity:.05}}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,255,229,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,229,.04) 1px,transparent 1px);background-size:54px 54px;pointer-events:none;z-index:0;animation:grid-drift 3s linear infinite}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 600px 400px at 20% 50%,rgba(0,255,229,.06) 0%,transparent 70%);animation:orb-move 8s ease-in-out infinite}
.bg-orb2{position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 500px 350px at 80% 30%,rgba(0,200,180,.05) 0%,transparent 70%);animation:orb-move2 11s ease-in-out infinite}

@property --angle{syntax:'<angle>';initial-value:0deg;inherits:false}
@keyframes spin{to{--angle:360deg}}
@keyframes pulse-glow{0%,100%{box-shadow:0 0 30px rgba(0,255,229,.08),0 0 60px rgba(0,255,229,.04)}50%{box-shadow:0 0 50px rgba(0,255,229,.18),0 0 100px rgba(0,255,229,.08)}}

#login-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:100;background:var(--bg)}
.login-card{width:420px;border-radius:16px;background:var(--bg2);padding:48px 40px;position:relative;animation:pulse-glow 3s ease-in-out infinite;background-clip:padding-box}
.login-card::before{content:'';position:absolute;inset:-2px;border-radius:18px;z-index:-1;background:conic-gradient(from var(--angle),transparent 20%,#00ffe5 40%,#00fff0 50%,#00ffe5 60%,transparent 80%);animation:spin 4s linear infinite}
.login-card::after{content:'';position:absolute;inset:0;border-radius:16px;background:var(--bg2);z-index:-1}
.login-logo{font-family:'Orbitron',monospace;font-size:22px;font-weight:900;color:var(--teal);letter-spacing:2px;margin-bottom:4px}
.login-logo span{color:rgba(232,245,242,.3)}
.login-sub{font-size:13px;color:var(--text-dim);margin-bottom:32px}
.login-label{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);margin-bottom:6px;display:block}
.login-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s;margin-bottom:16px}
.login-input:focus{border-color:var(--teal)}
.login-btn{width:100%;background:var(--teal);color:var(--bg);font-family:'Orbitron',monospace;font-size:13px;font-weight:700;letter-spacing:2px;padding:14px;border:none;border-radius:8px;cursor:pointer;margin-top:8px;transition:opacity .2s}
.login-btn:hover{opacity:.9}
.login-btn:disabled{opacity:.5;cursor:not-allowed}
.login-error{font-size:12px;color:var(--red);margin-top:10px;display:none;padding:8px 12px;background:rgba(255,64,96,.08);border-radius:6px;border:1px solid rgba(255,64,96,.2)}
.login-footer{margin-top:20px;font-size:12px;color:var(--text-dim);text-align:center}
.login-footer a{color:var(--teal);text-decoration:none;cursor:pointer}

#app{display:none;min-height:100vh;position:relative;z-index:1}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:240px;background:var(--bg2);border-right:1px solid var(--border);z-index:50;display:flex;flex-direction:column}
.sidebar-logo{padding:24px 20px 20px;border-bottom:1px solid var(--border)}
.sidebar-logo .logo-text{font-family:'Orbitron',monospace;font-size:16px;font-weight:900;color:var(--teal);letter-spacing:2px}
.sidebar-logo .logo-text span{color:rgba(232,245,242,.3)}
.role-badge{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);margin-top:4px}
.sidebar-nav{flex:1;padding:16px 0;overflow-y:auto}
.nav-section{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);padding:12px 20px 6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;color:var(--text-dim);font-size:13px;font-weight:500;transition:all .15s;border-left:2px solid transparent}
.nav-item:hover{color:var(--text);background:var(--teal-dim)}
.nav-item.active{color:var(--teal);background:var(--teal-dim);border-left-color:var(--teal)}
.nav-icon{width:16px;height:16px;flex-shrink:0;opacity:.7}
.nav-item.active .nav-icon{opacity:1}
.sidebar-footer{padding:16px 20px;border-top:1px solid var(--border)}
.user-avatar{width:32px;height:32px;border-radius:50%;background:var(--teal-dim);border:1px solid var(--border-bright);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--teal);flex-shrink:0}
.user-info{display:flex;align-items:center;gap:10px}
.user-name{font-size:13px;font-weight:500}
.user-role{font-size:11px;color:var(--text-dim)}
.logout-btn{margin-top:10px;width:100%;padding:8px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--text-dim);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.logout-btn:hover{border-color:var(--red);color:var(--red)}

.main{margin-left:240px;min-height:100vh;padding:32px}
.page{display:none}
.page.active{display:block}
.page-title{font-family:'Orbitron',monospace;font-size:20px;font-weight:700;color:var(--teal);letter-spacing:1px}
.page-sub{font-size:13px;color:var(--text-dim);margin-top:4px;margin-bottom:28px}

.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:18px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--teal),transparent);opacity:.4}
.stat-val{font-family:'Orbitron',monospace;font-size:28px;font-weight:700;color:var(--teal)}
.stat-label{font-size:12px;color:var(--text-dim);margin-top:6px}
.stat-change{font-size:11px;margin-top:4px;color:var(--green)}

.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:20px}
.card-title{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);margin-bottom:16px}

.table-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--bg2);padding:12px 16px;text-align:left;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);font-weight:500;border-bottom:1px solid var(--border)}
td{padding:12px 16px;border-bottom:1px solid rgba(0,255,229,.05);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--teal-dim)}
.badge{display:inline-block;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:rgba(0,229,160,.1);color:var(--green);border:1px solid rgba(0,229,160,.2)}
.badge-teal{background:var(--teal-dim);color:var(--teal);border:1px solid var(--border)}
.badge-red{background:rgba(255,64,96,.1);color:var(--red);border:1px solid rgba(255,64,96,.2)}
.badge-gold{background:rgba(240,192,64,.1);color:var(--gold);border:1px solid rgba(240,192,64,.2)}

.transcript-modal{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.transcript-modal.open{opacity:1;pointer-events:all}
.transcript-box{background:var(--bg2);border:1px solid var(--border-bright);border-radius:16px;width:560px;max-height:80vh;display:flex;flex-direction:column;overflow:hidden}
.transcript-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.transcript-title{font-family:'Orbitron',monospace;font-size:14px;color:var(--teal)}
.transcript-close{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:20px}
.transcript-body{padding:20px 24px;overflow-y:auto;flex:1}
.msg{margin-bottom:14px}
.msg-role{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px}
.msg-role.caller{color:var(--text-dim)}
.msg-role.aria{color:var(--teal)}
.msg-text{font-size:13px;line-height:1.6;background:var(--bg3);padding:10px 14px;border-radius:8px}
.aria-msg .msg-text{border-left:2px solid var(--teal)}

.form-group{margin-bottom:20px}
.form-label{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);margin-bottom:8px;display:block}
.form-input,.form-textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:11px 14px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s}
.form-input:focus,.form-textarea:focus{border-color:var(--teal)}
.form-textarea{resize:vertical;min-height:100px;line-height:1.6}
.faq-item{display:flex;gap:10px;margin-bottom:10px;align-items:flex-start}
.faq-inner{flex:1}
.faq-inner input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:9px 12px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;margin-bottom:6px}
.faq-remove{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:20px;padding:4px;transition:color .15s}
.faq-remove:hover{color:var(--red)}
.add-faq-btn{background:var(--teal-dim);border:1px solid var(--border);color:var(--teal);padding:8px 16px;border-radius:6px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:8px}
.save-btn{background:var(--teal);color:var(--bg);font-family:'Orbitron',monospace;font-size:12px;font-weight:700;letter-spacing:1.5px;padding:12px 28px;border:none;border-radius:8px;cursor:pointer}
.save-success{font-size:12px;color:var(--green);margin-left:12px;display:none}

.client-row-header,.client-row{display:grid;grid-template-columns:1fr 120px 140px 80px;gap:16px;align-items:center;padding:12px 16px}
.client-row{border-bottom:1px solid rgba(0,255,229,.05);cursor:pointer;transition:background .15s}
.client-row:hover{background:var(--teal-dim)}
.client-row:last-child{border-bottom:none}
.client-row-header{background:var(--bg2);border-bottom:1px solid var(--border)}
.col-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim)}
.client-name{font-weight:500;font-size:14px}
.client-industry{font-size:12px;color:var(--text-dim);margin-top:2px}

.plan-display{background:var(--bg2);border:1px solid var(--border-bright);border-radius:12px;padding:24px;margin-bottom:20px;position:relative;overflow:hidden}
.plan-display::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--teal),transparent)}
.plan-name-big{font-family:'Orbitron',monospace;font-size:24px;font-weight:700;color:var(--teal)}
.plan-price-big{font-size:36px;font-weight:300;margin:8px 0}
.plan-price-big span{font-size:16px;color:var(--text-dim)}
.plan-features-list{margin-top:16px;display:grid;gap:8px}
.plan-feature{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-dim)}
.plan-feature::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--teal);flex-shrink:0}

.search-bar{display:flex;gap:12px;margin-bottom:20px}
.search-input{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;outline:none}
.search-input:focus{border-color:var(--teal)}
</style>
</head>
<body>

<div class="bg-orb2"></div>
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">CONVERTA<span>.AI</span></div>
    <div class="login-sub">Sign in to Aria's Reception Portal</div>
    <label class="login-label">Email</label>
    <input class="login-input" type="email" id="login-email" placeholder="you@example.com"/>
    <label class="login-label">Password</label>
    <input class="login-input" type="password" id="login-pass" placeholder="••••••••"/>
    <div class="login-error" id="login-error">Invalid email or password. Please try again.</div>
    <button class="login-btn" id="login-btn" type="button">SIGN IN →</button>
    <div class="login-footer"><a href="/" style="color:var(--text-dim);text-decoration:none;display:block;margin-bottom:8px;transition:color .2s" onmouseover="this.style.color='var(--teal)'" onmouseout="this.style.color='var(--text-dim)'">← Back to home</a>Need access? <a id="support-email-link">support.converta&#64;gmail.com</a></div>
  </div>
</div>

<div id="app">
  <div class="sidebar">
    <div class="sidebar-logo">
      <a href="/" style="text-decoration:none"><div class="logo-text">CONVERTA<span>.AI</span></div></a>
      <div class="role-badge" id="role-badge">Portal</div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="user-avatar">?</div>
        <div>
          <div class="user-name" id="user-name-el">—</div>
          <div class="user-role" id="user-biz-el">—</div>
        </div>
      </div>
      <button class="logout-btn" id="logout-btn">Sign out</button>
      <a href="/" style="display:block;margin-top:8px;text-align:center;font-size:12px;color:var(--text-dim);text-decoration:none;transition:color .2s" onmouseover="this.style.color='var(--teal)'" onmouseout="this.style.color='var(--text-dim)'">← Back to home</a>
    </div>
  </div>
  <div class="main" id="main-content"></div>
</div>

<div class="transcript-modal" id="transcript-modal">
  <div class="transcript-box">
    <div class="transcript-header">
      <div class="transcript-title" id="modal-title">Call Transcript</div>
      <button class="transcript-close" id="modal-close">✕</button>
    </div>
    <div class="transcript-body" id="modal-body"></div>
  </div>
</div>

<script>
(function() {

  // ── Support email (split to avoid scrapers) ──
  var emailEl = document.getElementById('support-email-link');
  if (emailEl) {
    var addr = 'support.converta' + '@' + 'gmail.com';
    emailEl.textContent = addr;
    emailEl.style.color = 'var(--teal)';
    emailEl.style.textDecoration = 'none';
    emailEl.style.cursor = 'pointer';
    emailEl.onclick = function() { window.location.href = 'mailto:' + addr; };
  }

  // ── Auth ──
  var currentUser = null;
  var USERS = [
    { email: 'admin@converta.ai',      hash: 'b084d079609b7ad1b948c6968858e98677ad93a389b600b394a9100b5376b85f', role: 'admin',  name: 'Marcus',       biz: 'Converta.AI' },
    { email: 'democlient@converta.ai', hash: 'fa413cfe46c3fbb4d9bfb3241e3ab639fc162de381d1d6edebc511e5790dce45', role: 'client', name: 'Dr. Marcus B.', biz: 'Bright Smile Dental' },
  ];

  function hashPass(str) {
    return window.crypto.subtle.digest('SHA-256', new TextEncoder().encode(str)).then(function(buf) {
      return Array.from(new Uint8Array(buf)).map(function(b) { return b.toString(16).padStart(2,'0'); }).join('');
    });
  }

  function showError(msg) {
    var el = document.getElementById('login-error');
    el.textContent = msg;
    el.style.display = 'block';
  }

  function hideError() {
    document.getElementById('login-error').style.display = 'none';
  }

  function setBtn(text, disabled) {
    var btn = document.getElementById('login-btn');
    btn.textContent = text;
    btn.disabled = !!disabled;
  }

  function doLogin() {
    var email = document.getElementById('login-email').value.trim().toLowerCase();
    var pass  = document.getElementById('login-pass').value;
    hideError();

    if (!email || !pass) {
      showError('Please enter your email and password.');
      return;
    }

    setBtn('SIGNING IN...', true);

    hashPass(pass).then(function(hash) {
      var match = null;
      for (var i = 0; i < USERS.length; i++) {
        if (USERS[i].email === email && USERS[i].hash === hash) {
          match = USERS[i];
          break;
        }
      }
      if (match) {
        loginSuccess({ email: match.email, role: match.role, name: match.name, biz: match.biz }, pass);
      } else {
        showError('Invalid email or password. Please try again.');
        setBtn('SIGN IN →', false);
      }
    });
  }

  function loginSuccess(user, pass) {
    currentUser = user;
    if (pass) sessionStorage.setItem('aria_session_pass', pass);
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    initApp();
  }

  function logout() {
    currentUser = null;
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    document.getElementById('login-email').value = '';
    document.getElementById('login-pass').value = '';
    setBtn('SIGN IN →', false);
    hideError();
  }

  // ── Bind events ──
  document.getElementById('login-btn').addEventListener('click', doLogin);
  document.getElementById('login-pass').addEventListener('keydown', function(e) { if (e.key === 'Enter') doLogin(); });
  document.getElementById('login-email').addEventListener('keydown', function(e) { if (e.key === 'Enter') doLogin(); });
  document.getElementById('logout-btn').addEventListener('click', logout);
  document.getElementById('modal-close').addEventListener('click', function() {
    document.getElementById('transcript-modal').classList.remove('open');
  });
  document.getElementById('transcript-modal').addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('open');
  });

  // ── Mock Data ──
  var MOCK_CALLS = [
    {id:1, caller:'James Whitfield', phone:'+14045551234', reason:'New patient exam', duration:'2m 14s', time:'Today 9:14 AM', status:'captured', transcript:[{r:'caller',t:'Hi I need to schedule a new patient appointment'},{r:'aria',t:"Hi there! Thanks for calling Bright Smile Dental. What's your name?"},{r:'caller',t:'James Whitfield'},{r:'aria',t:"Great James! What's the best number to reach you?"},{r:'caller',t:'404-555-1234'},{r:'aria',t:"Are you a new or existing patient?"},{r:'caller',t:'New patient'},{r:'aria',t:"And what's the reason for your visit?"},{r:'caller',t:'Just a general cleaning'},{r:'aria',t:"Perfect James! Our team will call you back shortly. Have a great day!"}]},
    {id:2, caller:'Keisha Thompson', phone:'+17705559876', reason:'Tooth pain emergency', duration:'1m 48s', time:'Today 8:32 AM', status:'urgent', transcript:[{r:'caller',t:'I have really bad tooth pain'},{r:'aria',t:"I'm so sorry! We see dental emergencies same day. What's your name?"},{r:'caller',t:'Keisha Thompson'},{r:'aria',t:"Got it Keisha. Best number to reach you?"},{r:'caller',t:'770-555-9876'},{r:'aria',t:"I'm flagging this as urgent. Our team will call you back very shortly!"}]},
    {id:3, caller:'David Park', phone:'+16785554321', reason:'Insurance question', duration:'3m 02s', time:'Yesterday 4:45 PM', status:'captured', transcript:[{r:'caller',t:'Do you accept BlueCross?'},{r:'aria',t:"Yes! We accept BlueCross, Delta Dental, Cigna, Aetna and most PPO plans. Anything else?"},{r:'caller',t:'I also want to make an appointment'},{r:'aria',t:"Of course! What's your name?"},{r:'caller',t:'David Park'},{r:'aria',t:"Best number to reach you David?"},{r:'caller',t:'678-555-4321'},{r:'aria',t:"Our team will call you back shortly. Have a great day!"}]},
    {id:4, caller:'Unknown', phone:'+14045558765', reason:'Hung up', duration:'0m 12s', time:'Yesterday 11:20 AM', status:'missed', transcript:[]},
    {id:5, caller:'Maria Santos', phone:'+17705552468', reason:'Whitening consultation', duration:'2m 33s', time:'Mon 3:15 PM', status:'captured', transcript:[{r:'caller',t:'I want to ask about teeth whitening'},{r:'aria',t:"Great choice! What's your name?"},{r:'caller',t:'Maria Santos'},{r:'aria',t:"Best number for our team Maria?"},{r:'caller',t:'770-555-2468'},{r:'aria',t:"Our team will call you back with all the whitening options. Talk soon!"}]},
  ];

  var MOCK_CLIENTS = [
    {id:1, name:'Bright Smile Dental', owner:'Dr. Marcus B.', plan:'Growth', status:'active', calls:148, leads:127, mrr:397, industry:'Dental'},
    {id:2, name:'Luxe Med Spa', owner:'Amanda Chen', plan:'Pro', status:'active', calls:312, leads:289, mrr:897, industry:'Med Spa'},

  function initApp() {
    document.getElementById('user-avatar').textContent = currentUser.name.charAt(0).toUpperCase();

    document.getElementById('user-biz-el').textContent = currentUser.biz;
    document.getElementById('role-badge').textContent = '— ' + currentUser.role.charAt(0).toUpperCase() + currentUser.role.slice(1);

    // Load real data from server
    loadRealData();

    var nav = document.getElementById('sidebar-nav');
    nav.innerHTML = '';
    var items = NAV[currentUser.role] || NAV.client;
    items.forEach(function(item) {
      if (item.section) {
        nav.innerHTML += '<div class="nav-section">' + item.section + '</div>';
      } else {
        var el = document.createElement('div');
        el.className = 'nav-item';
        el.id = 'nav-' + item.id;
        el.innerHTML = mkIcon(item.path) + '<span>' + item.label + '</span>';
        el.addEventListener('click', function() { showPage(item.id); });
        nav.appendChild(el);
      }
    });

    var first = items.find(function(i) { return i.id; });
    if (first) showPage(first.id);
  }

  function showPage(id) {
    activePage = id;
    document.querySelectorAll('.nav-item').forEach(function(n) { n.classList.remove('active'); });
    var navEl = document.getElementById('nav-' + id);

    var pages = {
      'admin-dashboard': renderAdminDashboard,
      'admin-clients': renderAdminClients,

      'admin-billing': renderAdminBilling,

  window.saveSettings = function() {
    var s = loadSettings();
    var g = function(id) { var el = document.getElementById(id); return el ? el.value.trim() : null; };
    if (g('setting-biz-name'))  s.businessName = g('setting-biz-name');
    if (g('setting-greeting'))  s.greeting     = g('setting-greeting');
    if (g('setting-closing'))   s.closing      = g('setting-closing');
    if (g('setting-hours'))     s.hours        = g('setting-hours');
    s.urgent = g('setting-urgent') || '';
    s.never  = g('setting-never')  || '';
    var newQs = [];
    for (var i = 0; i < 20; i++) { var qEl = document.getElementById('q-' + i); if (qEl && qEl.value.trim()) newQs.push(qEl.value.trim()); }
    if (newQs.length) s.questions = newQs;
    var newFaqs = [];
    for (var j = 0; j < 50; j++) { var fqEl = document.getElementById('faq-q-' + j); var faEl = document.getElementById('faq-a-' + j); if (fqEl && fqEl.value.trim()) newFaqs.push({q: fqEl.value.trim(), a: faEl ? faEl.value.trim() : ''}); }
    if (newFaqs.length) s.faqs = newFaqs;

    // Save locally first
    localStorage.setItem('aria_settings_' + currentUser.email, JSON.stringify(s));

    var btn = document.querySelector('.save-btn');
    var msg = document.getElementById('save-success');
    var errMsg = document.getElementById('save-error');
    if (btn) btn.textContent = 'SAVING...';
    if (btn) btn.disabled = true;
    if (errMsg) errMsg.style.display = 'none';

    // Get stored password hash to authenticate with server
    var storedPass = sessionStorage.getItem('aria_session_pass');
    if (!storedPass) {
      // Prompt for password if not cached
      storedPass = prompt('Enter your portal password to sync settings to Aria:');
      if (storedPass) sessionStorage.setItem('aria_session_pass', storedPass);
    }

    if (!storedPass) {
      if (btn) { btn.textContent = 'SAVE ALL CHANGES'; btn.disabled = false; }
      if (msg) { msg.textContent = 'Saved locally only.'; msg.style.display = 'inline'; setTimeout(function(){ msg.style.display = 'none'; }, 3000); }
      return;
    }

    fetch('https://web-production-46fe1e.up.railway.app/client-settings', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: currentUser.email, password: storedPass, settings: s })
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
      if (btn) { btn.textContent = 'SAVE ALL CHANGES'; btn.disabled = false; }
      if (data.success) {
        if (msg) { msg.textContent = 'Saved! Aria will use these settings on the next call.'; msg.style.display = 'inline'; setTimeout(function(){ msg.style.display = 'none'; }, 4000); }
      } else {
        sessionStorage.removeItem('aria_session_pass');
        if (errMsg) { errMsg.textContent = 'Could not sync to Aria: ' + (data.error || 'Unknown error'); errMsg.style.display = 'inline'; }
      }
    })
    .catch(function() {
      if (btn) { btn.textContent = 'SAVE ALL CHANGES'; btn.disabled = false; }
      if (msg) { msg.textContent = 'Saved locally. Aria sync unavailable right now.'; msg.style.display = 'inline'; setTimeout(function(){ msg.style.display = 'none'; }, 4000); }
    });
  };

  window.openTx = function(id) {
    var call = MOCK_CALLS.find(function(c){return c.id===id;});
    if (!call || !call.transcript.length) return;
    document.getElementById('modal-title').textContent = 'Transcript — ' + call.caller + ' · ' + call.time;
    document.getElementById('modal-body').innerHTML = call.transcript.map(function(m) {
      return '<div class="msg ' + (m.r==='aria'?'aria-msg':'') + '"><div class="msg-role ' + m.r + '">' + (m.r==='aria'?'Aria':'Caller') + '</div><div class="msg-text">' + m.t + '</div></div>';
    }).join('');
    document.getElementById('transcript-modal').classList.add('open');
  };

  window.addFaq = function() {
    var list = document.getElementById('faq-list');
    var div = document.createElement('div');
    div.className = 'faq-item';
    div.innerHTML = '<div class="faq-inner"><input placeholder="Question"/><input placeholder="Answer"/></div><button class="faq-remove" onclick="this.closest(\'.faq-item\').remove()">×</button>';
    list.appendChild(div);
  };



})();
</script>
</body>
</html>
